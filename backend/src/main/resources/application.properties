spring.application.name=lms-backend
server.port=${PORT:8080}

# Database Configuration (Environment variables for Cloud, Defaults for Local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:lmsdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# Security & Console
spring.h2.console.enabled=true
spring.security.debug=false
logging.level.org.springframework.security=INFO

# File Upload sizes (optional for LMS)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
